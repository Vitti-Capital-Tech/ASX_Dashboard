name: Daily ASX Announcements

on:
  # GitHub schedule is UTC-only. We trigger every 5 min during UTC hours that overlap
  # the desired AEST window (UTC+10). Job "gate" skips unless local Sydney time is:
  #   Mon–Fri: 09:00–09:55 every 5 min, then 10:00–14:00 on the hour.
  # "On the hour" allows minute<=10 to tolerate GitHub scheduler drift (often 5-15 min late).
  # Weekends: no fetch (gate off). Manual workflow_dispatch always runs the fetch.
  # 9am AEST = 23:00 UTC | 2pm AEST = 04:00 UTC
  schedule:
   # Every 5 min during first hour (08:00–09:00 AEST)
  - cron: "*/5 22 * * 1-5"

  # Every 5 min during first hour (09:00–10:00 AEST)
  - cron: "*/5 23 * * 1-5"

  # Every hour after that (10:00–14:00 AEST)
  - cron: "0 0-4 * * 1-5"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: "Date to fetch (YYYY-MM-DD). Leave blank for today AEST."
        required: false
        default: ""

# Secrets (Settings → Secrets and variables → Actions):
#   GROQ_API_KEY        — recommended; failover if Anthropic errors
#   ANTHROPIC_API_KEY   — optional primary (Claude); omit to use Groq only
# Variables (optional overrides; leave unset to use fetch_asx.py defaults):
#   GROQ_MODEL, ANTHROPIC_MODEL
jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.pick.outputs.proceed }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OUT=$(python3 <<EOF
          from datetime import datetime
          import zoneinfo

          z = zoneinfo.ZoneInfo("Australia/Sydney")
          n = datetime.now(z)

          hour = n.hour
          minute = n.minute
          weekday = n.weekday()  # 0=Mon, 6=Sun

          run = False

          if weekday < 5:  # Mon–Fri
              # 08:00–09:55 window (every ~5 min, tolerate delay)
              if hour >= 8 and hour < 10 and  minute <= 59:
                  run = True

              # 10:00–14:00 hourly with tolerance (<= 30 min)
              elif 10 <= hour <= 14 and minute <= 30:
                  run = True

          print("true" if run else "false")
          EOF
          )

          echo "proceed=$OUT" >> "$GITHUB_OUTPUT"

  fetch-and-summarise:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit logs/ back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ASX fetcher
        env:
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: |
          # Blank date → default logic in fetch_asx.py (scheduled runs have no inputs)
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -u fetch_asx.py --date "${{ github.event.inputs.date }}"
          else
            python -u fetch_asx.py
          fi

      - name: Commit and push log file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --cached --quiet || git commit -m "chore: ASX log $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
