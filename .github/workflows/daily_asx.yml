name: Daily ASX Announcements

on:
  # GitHub schedule is UTC-only. We trigger every 5 min during UTC hours that overlap
  # the desired AEST window (UTC+10). Job "gate" skips unless local Sydney time is:
  #   Mon–Fri: 09:00–09:55 every 5 min, then 10:00–14:00 on the hour.
  # "On the hour" allows minute<=10 to tolerate GitHub scheduler drift (often 5-15 min late).
  # Weekends: no fetch (gate off). Manual workflow_dispatch always runs the fetch.
  # 9am AEST = 23:00 UTC | 2pm AEST = 04:00 UTC
  schedule:
    - cron: "*/5 23,0,1,2,3,4 * * 1-5"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: "Date to fetch (YYYY-MM-DD). Leave blank for today AEST."
        required: false
        default: ""

# Secrets (Settings → Secrets and variables → Actions):
#   GROQ_API_KEY        — recommended; failover if Anthropic errors
#   ANTHROPIC_API_KEY   — optional primary (Claude); omit to use Groq only
# Variables (optional overrides; leave unset to use fetch_asx.py defaults):
#   GROQ_MODEL, ANTHROPIC_MODEL
jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.pick.outputs.proceed }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OUT=$(python3 -c "from datetime import datetime; import zoneinfo; z=zoneinfo.ZoneInfo('Australia/Sydney'); n=datetime.now(z); print('false' if n.weekday()>=5 else 'true' if (n.hour==9 and n.minute%5==0 and n.minute<=55) else 'true' if (10<=n.hour<=14 and n.minute<=10) else 'false')")
          echo "proceed=$OUT" >> "$GITHUB_OUTPUT"

  fetch-and-summarise:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit logs/ back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ASX fetcher
        env:
          PYTHONUNBUFFERED: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: |
          # Blank date → default logic in fetch_asx.py (scheduled runs have no inputs)
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -u fetch_asx.py --date "${{ github.event.inputs.date }}"
          else
            python -u fetch_asx.py
          fi

      - name: Commit and push log file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --cached --quiet || git commit -m "chore: ASX log $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
